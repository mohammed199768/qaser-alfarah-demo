<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Grand Chronicles — Interactive Flipbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* =====================================================
       RESET & BASE
    ===================================================== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #120800;
      font-family: 'EB Garamond', Georgia, serif;
      overflow: hidden;
      user-select: none;
    }

    /* Radial ambient glow behind book */
    body::before {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 900px; height: 700px;
      background: radial-gradient(ellipse at center,
        rgba(200, 120, 30, 0.18) 0%,
        rgba(120, 60, 10, 0.08) 40%,
        transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Book heading */
    .book-heading {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 8px;
      color: rgba(212, 168, 83, 0.75);
      text-transform: uppercase;
      margin-bottom: 28px;
      position: relative;
      z-index: 10;
    }

    /* =====================================================
       stf__parent  — faithful copy of stPageFlip.css
       position:relative + GPU layer + touch routing
    ===================================================== */
    .stf__parent {
      position: relative;
      display: block;
      box-sizing: border-box;
      transform: translateZ(0);       /* GPU compositing layer */
      -ms-touch-action: pan-y;
      touch-action: pan-y;            /* horizontal swipe = book, vertical = scroll */
      z-index: 10;
      /* Drop shadow to simulate book lying on a surface */
      filter: drop-shadow(0 50px 100px rgba(0,0,0,0.9))
              drop-shadow(0 20px 40px rgba(0,0,0,0.6));
    }

    /* =====================================================
       stf__wrapper  — inner structural wrapper (UI.ts)
    ===================================================== */
    .stf__wrapper {
      position: relative;
      width: 100%;
      box-sizing: border-box;
    }

    /* =====================================================
       stf__block  — the actual book face (HTMLUI.ts)
       Contains left page, right page, shadows
    ===================================================== */
    .stf__block {
      position: relative;
      overflow: hidden;
      /* Book edge/border */
      outline: 1px solid rgba(0,0,0,0.4);
    }

    /* =====================================================
       stf__item  — each page div (HTMLPage.ts)
       transform-origin, clip-path applied by JS each frame
    ===================================================== */
    .stf__item {
      display: block;
      position: absolute;
      top: 0;
      overflow: hidden;
      transform-origin: 0 0;
    }

    /* Soft pages: warm paper texture gradient */
    .stf__item.--soft {
      background: linear-gradient(160deg, #fdf8ee 0%, #f4e8c8 60%, #eddbb0 100%);
    }

    /* Hard pages: dark leather cover */
    .stf__item.--hard {
      background: linear-gradient(150deg, #1c0b04 0%, #3a1a08 50%, #1c0b04 100%);
    }

    /* =====================================================
       Shadow divs  — equivalent to HTMLRender.createShadows()
       All positioned/styled by JS inline per frame
    ===================================================== */
    .stf__outerShadow,
    .stf__innerShadow,
    .stf__hardShadow,
    .stf__hardInnerShadow {
      display: none;
      position: absolute;
      top: 0;
      pointer-events: none;
    }

    /* Book spine divider */
    .book-spine {
      position: absolute;
      top: 0;
      pointer-events: none;
      z-index: 50;
      background: linear-gradient(to right,
        rgba(0,0,0,0.6) 0%,
        rgba(0,0,0,0.2) 30%,
        rgba(255,255,255,0.08) 50%,
        rgba(0,0,0,0.2) 70%,
        rgba(0,0,0,0.5) 100%);
    }

    /* =====================================================
       NAVIGATION
    ===================================================== */
    .book-nav {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-top: 28px;
      position: relative;
      z-index: 10;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid rgba(212, 168, 83, 0.35);
      color: rgba(212, 168, 83, 0.8);
      padding: 9px 22px;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 1px;
      transition: background 0.25s, border-color 0.25s, color 0.25s, box-shadow 0.25s;
    }
    .nav-btn:hover:not(:disabled) {
      background: rgba(212, 168, 83, 0.08);
      border-color: rgba(212, 168, 83, 0.7);
      color: rgba(212, 168, 83, 1);
      box-shadow: 0 0 18px rgba(212, 168, 83, 0.15);
    }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }

    .page-counter {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 4px;
      color: rgba(212, 168, 83, 0.55);
      min-width: 90px;
      text-align: center;
    }

    /* =====================================================
       CORNER FOLD HINT  — showPageCorners behaviour
    ===================================================== */
    #cornerHint {
      position: absolute;
      pointer-events: none;
      z-index: 200;
      transition: opacity 0.2s;
      opacity: 0;
      mix-blend-mode: multiply;
    }
  </style>
</head>
<body>

<div class="book-heading">The Grand Chronicles &nbsp;·&nbsp; Vol. I</div>

<!-- =====================================================
     DOM Structure — mirrors StPageFlip's generated HTML
===================================================== -->
<div class="stf__parent" id="stfParent">
  <div class="stf__wrapper" id="stfWrapper">
    <div class="stf__block" id="stfBlock">

      <!-- Static left page -->
      <div class="stf__item" id="leftPage"></div>
      <!-- Static right page (revealed during flip) -->
      <div class="stf__item" id="rightPage"></div>
      <!-- Back face of the page being flipped (second half of animation) -->
      <div class="stf__item" id="backPage"></div>
      <!-- Front face of the page being flipped (first half of animation) -->
      <div class="stf__item" id="flipPage"></div>

      <!-- Shadow divs — equivalent to HTMLRender.createShadows() -->
      <div class="stf__outerShadow"    id="outerShadow"></div>
      <div class="stf__innerShadow"    id="innerShadow"></div>
      <div class="stf__hardShadow"     id="hardShadow"></div>
      <div class="stf__hardInnerShadow"id="hardInnerShadow"></div>

      <!-- Spine divider -->
      <div class="book-spine" id="spine"></div>

      <!-- Corner fold hint -->
      <div id="cornerHint"></div>
    </div>
  </div>
</div>

<nav class="book-nav">
  <button class="nav-btn" id="prevBtn">&#8592; Prev</button>
  <div class="page-counter" id="pageCounter">1 / 6</div>
  <button class="nav-btn" id="nextBtn">Next &#8594;</button>
</nav>

<!-- =====================================================
     FLIPBOOK ENGINE
     Faithful recreation of StPageFlip architecture:
       - Settings  (→ settings.ts)
       - Shadow system (→ HTMLRender.ts)
       - UI layout (→ UI.ts)
       - Page objects (→ HTMLPage.ts)
       - requestAnimationFrame loop (→ Render.ts)
       - AnimationProcess object (→ Render.ts)
       - clip-path polygon fold (→ HTMLRender.drawSoftShadow)
       - perspective rotateY for hard pages
       - Event binding (→ UI.ts touch/mouse handlers)
===================================================== -->
<script>
'use strict';

/* =====================================================
   SETTINGS  — mirrors IFlipSetting interface
===================================================== */
const Settings = {
  width          : 390,          // page width  (px)
  height         : 530,          // page height (px)
  flippingTime   : 850,          // ms  — AnimationProcess.duration
  drawShadow     : true,         // enable shadow rendering
  maxShadowOpacity: 0.55,        // Shadow.opacity max
  showCover      : true,         // first/last pages = hard cover
  usePortrait    : true,         // allow portrait (single-page) on small screens
  swipeDistance  : 30,           // min px swipe to trigger flip
  showPageCorners: true,         // corner fold hint on hover
};

/* =====================================================
   PAGE CONTENT DATA
===================================================== */
function hardCoverHTML(title, sub, isFront) {
  if (isFront) return `
  <div style="width:100%;height:100%;background:linear-gradient(150deg,#1a0900 0%,#3d1c0a 45%,#1a0900 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;position:relative;overflow:hidden;">
    <div style="position:absolute;inset:0;opacity:0.04;background:repeating-linear-gradient(45deg,#d4a853 0,#d4a853 1px,transparent 0,transparent 50%);background-size:12px 12px;"></div>
    <div style="border:1.5px solid rgba(212,168,83,0.45);padding:34px 44px;text-align:center;position:relative;max-width:300px;">
      <div style="border:1px solid rgba(212,168,83,0.18);position:absolute;inset:7px;"></div>
      <div style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:7px;text-transform:uppercase;color:rgba(212,168,83,0.6);margin-bottom:22px;">Ancient Writings</div>
      <div style="font-family:'Cinzel',serif;font-size:1.75rem;font-weight:700;letter-spacing:3px;color:#d4a853;text-shadow:0 0 40px rgba(212,168,83,0.45);line-height:1.2;margin-bottom:6px;">${title}</div>
      <div style="width:50px;height:1px;background:rgba(212,168,83,0.5);margin:16px auto;"></div>
      <div style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:5px;text-transform:uppercase;color:rgba(212,168,83,0.75);">${sub}</div>
    </div>
    <div style="position:absolute;bottom:28px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:rgba(212,168,83,0.35);">MMXXV</div>
  </div>`;

  return `
  <div style="width:100%;height:100%;background:linear-gradient(150deg,#1a0900 0%,#3d1c0a 45%,#1a0900 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;">
    <div style="text-align:center;max-width:280px;">
      <div style="font-family:'EB Garamond',serif;font-style:italic;font-size:1.05rem;color:rgba(212,168,83,0.75);line-height:1.9;">
        "Every ending is the beginning of another story, unwritten and waiting."
      </div>
      <div style="width:40px;height:1px;background:rgba(212,168,83,0.35);margin:22px auto;"></div>
      <div style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;color:rgba(212,168,83,0.4);text-transform:uppercase;">${title}</div>
    </div>
  </div>`;
}

function softPageHTML(num, chapter, body) {
  return `
  <div style="width:100%;height:100%;background:linear-gradient(180deg,#fdf8ee 0%,#f4e8c8 100%);
    padding:52px 42px 44px;color:#2c1810;position:relative;overflow:hidden;">
    <div style="position:absolute;inset:0;opacity:0.025;background:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2280%22><circle cx=%2240%22 cy=%2240%22 r=%221%22 fill=%22%23000%22/></svg>');"></div>
    <div style="font-family:'Cinzel',serif;font-size:8px;letter-spacing:6px;text-transform:uppercase;color:rgba(140,70,20,0.65);text-align:center;margin-bottom:18px;">${chapter}</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:22px;">
      <div style="flex:1;height:1px;background:rgba(140,70,20,0.18);"></div>
      <div style="width:5px;height:5px;border-radius:50%;background:rgba(140,70,20,0.35);"></div>
      <div style="flex:1;height:1px;background:rgba(140,70,20,0.18);"></div>
    </div>
    <div style="font-family:'EB Garamond',serif;font-size:1rem;line-height:2;color:#2c1810;text-align:justify;">
      ${body}
    </div>
    <div style="position:absolute;bottom:26px;left:0;right:0;text-align:center;font-family:'Cinzel',serif;font-size:8px;letter-spacing:3px;color:rgba(140,70,20,0.45);">— ${num} —</div>
    <div style="position:absolute;top:14px;left:14px;width:18px;height:18px;border-top:1px solid rgba(140,70,20,0.22);border-left:1px solid rgba(140,70,20,0.22);"></div>
    <div style="position:absolute;top:14px;right:14px;width:18px;height:18px;border-top:1px solid rgba(140,70,20,0.22);border-right:1px solid rgba(140,70,20,0.22);"></div>
    <div style="position:absolute;bottom:14px;left:14px;width:18px;height:18px;border-bottom:1px solid rgba(140,70,20,0.22);border-left:1px solid rgba(140,70,20,0.22);"></div>
    <div style="position:absolute;bottom:14px;right:14px;width:18px;height:18px;border-bottom:1px solid rgba(140,70,20,0.22);border-right:1px solid rgba(140,70,20,0.22);"></div>
  </div>`;
}

/* Pages array — index 0 = front cover, last = back cover */
const PAGES = [
  { type:'hard', html: hardCoverHTML('The Grand Chronicles','Volume I', true) },
  { type:'soft', html: softPageHTML(1,'Prologue',
    `In the beginning, there was only silence — a vast, unbroken stillness that stretched across the ages like a sea without shores.<br><br>
     The first words were written not in ink, but in light itself, traced by invisible hands across the dome of the heavens. It was here that the great story began.`) },
  { type:'soft', html: softPageHTML(2,'Chapter I',
    `The morning of the first day broke like a promise kept after a long winter. Golden light spilled across the hilltops, painting everything it touched in shades of amber and rose.<br><br>
     The travelers stirred in their camp, unaware that this day would change the course of everything they had ever known.`) },
  { type:'soft', html: softPageHTML(3,'Chapter I',
    `The path wound through ancient forests where the trees stood like cathedral columns, their canopies woven together into a vaulted ceiling of green and gold.<br><br>
     Somewhere above, a bird called out — three clear notes that echoed and faded into the distance. She had walked this road many times, but never quite like this.`) },
  { type:'soft', html: softPageHTML(4,'Chapter II',
    `The map was wrong. She knew it the moment she unfolded it in the grey afternoon light, studying the faded lines that claimed a river should be where only dry earth met her eyes.<br><br>
     Two days of travel, two days of careful navigation — all for nothing. Or perhaps for something she hadn't yet understood.`) },
  { type:'soft', html: softPageHTML(5,'Chapter II',
    `The village appeared without warning, tucked into a fold of the valley like a secret well-kept. Smoke curled from a dozen chimneys, and the smell of bread baking reached them long before the first lights became visible.<br><br>
     "No maps lead here," the old man at the gate told them with a slow smile.`) },
  { type:'soft', html: softPageHTML(6,'Chapter III',
    `There are things that cannot be explained — only experienced. The library had stood at the center of the town for as long as anyone could remember, its shelves stretching upward into shadows.<br><br>
     The book she sought had no title on its spine. It had no author. But it knew her name.`) },
  { type:'soft', html: softPageHTML(7,'Epilogue',
    `She returned to the valley on the first day of spring, when the ground was soft and the world smelled of new beginnings.<br><br>
     The village was still there — or something very like it. The faces were different, the buildings subtly changed. Only the old man at the gate was the same, smiling as though no time had passed at all.`) },
  { type:'hard', html: hardCoverHTML('The Grand Chronicles','End of Volume I', false) },
];

/* =====================================================
   DOM REFERENCES
===================================================== */
const W  = Settings.width;
const H  = Settings.height;
const TW = W * 2;  // total book width (two pages)

const parent     = document.getElementById('stfParent');
const block      = document.getElementById('stfBlock');
const leftPage   = document.getElementById('leftPage');
const rightPage  = document.getElementById('rightPage');
const backPage   = document.getElementById('backPage');
const flipPage   = document.getElementById('flipPage');
const outerShad  = document.getElementById('outerShadow');
const innerShad  = document.getElementById('innerShadow');
const hardShad   = document.getElementById('hardShadow');
const hardIShad  = document.getElementById('hardInnerShadow');
const spine      = document.getElementById('spine');
const cornerHint = document.getElementById('cornerHint');
const prevBtn    = document.getElementById('prevBtn');
const nextBtn    = document.getElementById('nextBtn');
const counter    = document.getElementById('pageCounter');

/* =====================================================
   UI SIZE SETUP  — mirrors UI.ts constructor
   Applies inline styles to parent (stf__parent = inBlock)
===================================================== */
parent.style.width    = TW + 'px';
parent.style.height   = H  + 'px';
parent.style.minWidth = TW + 'px';
parent.style.minHeight= H  + 'px';

block.style.width  = TW + 'px';
block.style.height = H  + 'px';

/* Static left page sizing */
leftPage.style.cssText  = `width:${W}px;height:${H}px;left:0;top:0;z-index:1;`;
/* Static right page sizing */
rightPage.style.cssText = `width:${W}px;height:${H}px;left:${W}px;top:0;z-index:1;`;
/* Flipping page (front face) */
flipPage.style.cssText  = `width:${W}px;height:${H}px;top:0;z-index:10;display:none;`;
/* Back face of flipping page */
backPage.style.cssText  = `width:${W}px;height:${H}px;top:0;z-index:9;display:none;`;

/* Spine — visual centre divider */
spine.style.cssText = `left:${W-2}px;top:0;width:4px;height:${H}px;`;

/* =====================================================
   BOOK STATE  — tracks current spread (pair of pages)
   Equivalent to PageFlip's internal page tracking
===================================================== */
const totalSpreads = Math.ceil(PAGES.length / 2);
let spread = 0;   // 0 = cover / first spread
let animating = false;

/* Left and right page indices for current spread */
function leftIdx()  { return spread * 2 - 1; }
function rightIdx() { return spread * 2; }

/* =====================================================
   setContent — sets innerHTML + class on a page div
   Equivalent to HTMLPage content loading
===================================================== */
function setContent(el, idx) {
  if (idx < 0 || idx >= PAGES.length) {
    el.innerHTML = '';
    el.className = 'stf__item --soft';
    el.style.background = 'transparent';
    return;
  }
  const pg = PAGES[idx];
  el.innerHTML  = pg.html;
  el.className  = 'stf__item --' + pg.type;
  el.style.background = '';
}

/* =====================================================
   renderSpread — static render of current spread
   Equivalent to Render.render() in idle state
===================================================== */
function renderSpread() {
  setContent(leftPage,  leftIdx());
  setContent(rightPage, rightIdx());

  leftPage.style.display  = leftIdx() >= 0 ? 'block' : 'none';
  rightPage.style.display = rightIdx() < PAGES.length ? 'block' : 'none';

  prevBtn.disabled = spread === 0 || animating;
  nextBtn.disabled = spread >= totalSpreads - 1 || animating;
  counter.textContent = (spread + 1) + ' / ' + totalSpreads;
}

/* =====================================================
   clearShadows — mirrors HTMLRender.clearShadow()
   Uses style.cssText to reset all shadow divs at once
===================================================== */
function clearShadows() {
  outerShad.style.cssText = 'display:none;position:absolute;top:0;pointer-events:none;';
  innerShad.style.cssText = 'display:none;position:absolute;top:0;pointer-events:none;';
  hardShad.style.cssText  = 'display:none;position:absolute;top:0;pointer-events:none;';
  hardIShad.style.cssText = 'display:none;position:absolute;top:0;pointer-events:none;';
}

/* =====================================================
   EASING  — smooth cubic ease-in-out
   Equivalent to the animation frame interpolation in Render.ts
===================================================== */
function easeInOut(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}

/* =====================================================
   FORWARD FLIP  —  right page flips to left side
   Phase 1 (p=0→0.5): front face shrinks (clip-path polygon)
   Phase 2 (p=0.5→1): back face grows on left side
   Shadow system: outerShadow + innerShadow updated per frame
===================================================== */
function drawForwardFlip(p) {
  if (p < 0.5) {
    /* ---- Phase 1: front of right page folding ---- */
    const t = p / 0.5;   // normalised 0→1

    flipPage.style.display = 'block';
    flipPage.style.left    = W + 'px';
    backPage.style.display = 'none';

    /*  Diagonal fold geometry (clip-path polygon):
        Top-right corner moves slightly (perspective)
        Bottom-right corner moves fully → creates diagonal fold line
        Equivalent to the polygon calculation in HTMLRender.ts         */
    const brX = W * (1 - t);                   // bottom-right x
    const trX = W * (1 - t * 0.55);            // top-right x   (moves less → diagonal)
    const cp  = `polygon(0px 0px, ${Math.max(0,trX).toFixed(1)}px 0px, ${Math.max(0,brX).toFixed(1)}px ${H}px, 0px ${H}px)`;
    flipPage.style.clipPath = cp;
    flipPage.style.transform = '';

    if (Settings.drawShadow && t > 0.04) {
      const op = t * Settings.maxShadowOpacity;

      /* outerShadow — on the surface of the flipping page (right side) */
      const ow = Math.min(90, t * 110);
      outerShad.style.cssText = `
        display:block;position:absolute;pointer-events:none;z-index:15;
        left:${W + brX - ow}px;top:0;
        width:${ow}px;height:${H}px;
        background:linear-gradient(to left, rgba(0,0,0,${op.toFixed(3)}) 0%, rgba(0,0,0,0) 100%);
      `;

      /* innerShadow — falls on the static left page */
      const iw = Math.min(70, t * 90);
      const io = t * Settings.maxShadowOpacity * 0.55;
      innerShad.style.cssText = `
        display:block;position:absolute;pointer-events:none;z-index:8;
        left:${W - iw}px;top:0;
        width:${iw}px;height:${H}px;
        background:linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,${io.toFixed(3)}) 100%);
      `;

      /* hardShadow — fold crease line highlight */
      const co = Math.min(0.35, t * 0.5);
      hardShad.style.cssText = `
        display:block;position:absolute;pointer-events:none;z-index:16;
        left:${W + brX - 3}px;top:0;
        width:6px;height:${H}px;
        background:linear-gradient(to right, rgba(0,0,0,${co.toFixed(3)}) 0%, rgba(255,255,255,0.05) 50%, rgba(0,0,0,0.1) 100%);
      `;
    } else if (t <= 0.04) { clearShadows(); }

  } else {
    /* ---- Phase 2: back of page emerging on left side ---- */
    const t = (p - 0.5) / 0.5;  // normalised 0→1

    flipPage.style.display = 'none';
    backPage.style.display = 'block';
    backPage.style.left    = '0px';

    /*  Back face clip-path:
        Mirrors Phase 1 — page grows from spine outward on left side    */
    const bw  = W * t;
    const tOff = W * (1 - t * 0.55);  // top edge (slightly diagonal)
    backPage.style.clipPath = `polygon(
      ${(W - bw * 1.0).toFixed(1)}px 0px,
      ${W}px 0px,
      ${W}px ${H}px,
      ${(W - bw).toFixed(1)}px ${H}px
    )`;
    backPage.style.transform = '';

    /* Fade shadows in phase 2 */
    if (Settings.drawShadow) {
      const io = (1 - t) * Settings.maxShadowOpacity * 0.35;
      const iw = Math.max(0, (1-t) * 55);
      if (io > 0.01 && iw > 0) {
        innerShad.style.cssText = `
          display:block;position:absolute;pointer-events:none;z-index:8;
          left:${W - bw}px;top:0;
          width:${iw}px;height:${H}px;
          background:linear-gradient(to right, rgba(0,0,0,${io.toFixed(3)}) 0%, rgba(0,0,0,0) 100%);
        `;
      } else { innerShad.style.cssText = 'display:none;position:absolute;top:0;pointer-events:none;'; }
      outerShad.style.cssText = 'display:none;position:absolute;top:0;pointer-events:none;';
      hardShad.style.cssText  = 'display:none;position:absolute;top:0;pointer-events:none;';
    }
  }
}

/* =====================================================
   BACKWARD FLIP  — left page flips to right side
   Mirror image of forward flip
===================================================== */
function drawBackwardFlip(p) {
  if (p < 0.5) {
    const t = p / 0.5;

    flipPage.style.display = 'block';
    flipPage.style.left    = '0px';
    backPage.style.display = 'none';

    const blX = W * t;               // bottom-left X (moves right, faster)
    const tlX = W * t * 0.55;        // top-left X    (moves right, slower → diagonal)
    flipPage.style.clipPath = `polygon(
      ${Math.min(W, tlX).toFixed(1)}px 0px,
      ${W}px 0px,
      ${W}px ${H}px,
      ${Math.min(W, blX).toFixed(1)}px ${H}px
    )`;
    flipPage.style.transform = '';

    if (Settings.drawShadow && t > 0.04) {
      const op = t * Settings.maxShadowOpacity;
      const ow = Math.min(90, t * 110);
      outerShad.style.cssText = `
        display:block;position:absolute;pointer-events:none;z-index:15;
        left:${blX}px;top:0;
        width:${ow}px;height:${H}px;
        background:linear-gradient(to right, rgba(0,0,0,${op.toFixed(3)}) 0%, rgba(0,0,0,0) 100%);
      `;
      const io = t * Settings.maxShadowOpacity * 0.55;
      const iw = Math.min(70, t * 90);
      innerShad.style.cssText = `
        display:block;position:absolute;pointer-events:none;z-index:8;
        left:${W}px;top:0;
        width:${iw}px;height:${H}px;
        background:linear-gradient(to left, rgba(0,0,0,0) 0%, rgba(0,0,0,${io.toFixed(3)}) 100%);
      `;
      const co = Math.min(0.35, t * 0.5);
      hardShad.style.cssText = `
        display:block;position:absolute;pointer-events:none;z-index:16;
        left:${blX - 3}px;top:0;
        width:6px;height:${H}px;
        background:linear-gradient(to left, rgba(0,0,0,${co.toFixed(3)}) 0%, rgba(255,255,255,0.05) 50%, rgba(0,0,0,0.1) 100%);
      `;
    } else if (t <= 0.04) { clearShadows(); }

  } else {
    const t = (p - 0.5) / 0.5;

    flipPage.style.display = 'none';
    backPage.style.display = 'block';
    backPage.style.left    = W + 'px';

    const bw = W * t;
    backPage.style.clipPath = `polygon(
      0px 0px,
      ${bw.toFixed(1)}px 0px,
      ${bw.toFixed(1)}px ${H}px,
      0px ${H}px
    )`;
    backPage.style.transform = '';

    if (Settings.drawShadow) {
      const io = (1 - t) * Settings.maxShadowOpacity * 0.35;
      const iw = Math.max(0, (1-t) * 55);
      if (io > 0.01 && iw > 0) {
        innerShad.style.cssText = `
          display:block;position:absolute;pointer-events:none;z-index:8;
          left:${W + bw}px;top:0;
          width:${iw}px;height:${H}px;
          background:linear-gradient(to left, rgba(0,0,0,${io.toFixed(3)}) 0%, rgba(0,0,0,0) 100%);
        `;
      } else { innerShad.style.cssText = 'display:none;position:absolute;top:0;pointer-events:none;'; }
      outerShad.style.cssText = 'display:none;position:absolute;top:0;pointer-events:none;';
      hardShad.style.cssText  = 'display:none;position:absolute;top:0;pointer-events:none;';
    }
  }
}

/* =====================================================
   START FLIP  — initialises AnimationProcess (Render.ts)
   Prepares page elements then kicks off rAF loop
===================================================== */
function startFlip(dir) {
  if (animating) return;
  if (dir === 'fwd' && spread >= totalSpreads - 1) return;
  if (dir === 'bwd' && spread <= 0) return;

  animating = true;
  prevBtn.disabled = true;
  nextBtn.disabled = true;

  /* Prepare pages for animation */
  if (dir === 'fwd') {
    /* Forward: right page flips away, back face = next left page */
    setContent(flipPage, rightIdx());
    flipPage.style.left = W + 'px';
    setContent(backPage, rightIdx() + 1);   // back = next spread's left page
    backPage.style.left = '0px';
    /* Pre-load new right page underneath */
    setContent(rightPage, rightIdx() + 2);
  } else {
    /* Backward: left page flips back, back face = previous right page */
    setContent(flipPage, leftIdx());
    flipPage.style.left = '0px';
    setContent(backPage, leftIdx() - 1);    // back = previous spread's right page
    backPage.style.left = W + 'px';
    /* Pre-load new left page underneath */
    setContent(leftPage, leftIdx() - 2);
  }

  /* AnimationProcess object — equivalent to Render.ts AnimationProcess type */
  const startTime = performance.now();
  const duration  = Settings.flippingTime;

  function frame(now) {
    const raw = Math.min((now - startTime) / duration, 1);
    const p   = easeInOut(raw);   // eased progress 0→1

    /* drawFrame() call — selects forward or backward renderer */
    if (dir === 'fwd') drawForwardFlip(p);
    else               drawBackwardFlip(p);

    if (raw < 1) {
      requestAnimationFrame(frame);   // request next frame
    } else {
      /* onAnimateEnd — flip complete, advance spread */
      flipPage.style.display  = 'none';
      flipPage.style.clipPath = 'none';
      backPage.style.display  = 'none';
      backPage.style.clipPath = 'none';
      clearShadows();

      if (dir === 'fwd') spread++;
      else               spread--;

      animating = false;
      renderSpread();
    }
  }

  requestAnimationFrame(frame);  // ← the animation loop starts here
}

/* =====================================================
   CORNER FOLD HINT  — showPageCorners behaviour
   Shows a subtle folded-corner triangle on hover
===================================================== */
function updateCornerHint(bookX, bookY) {
  if (!Settings.showPageCorners || animating) {
    cornerHint.style.opacity = '0';
    return;
  }
  const threshold = 55;
  const nearRight = bookX > TW - threshold && bookY > H - threshold && spread < totalSpreads - 1;
  const nearLeft  = bookX < threshold      && bookY > H - threshold && spread > 0;

  if (nearRight) {
    const dist  = Math.max(4, Math.sqrt(Math.pow(TW - bookX, 2) + Math.pow(H - bookY, 2)));
    const sz    = Math.min(42, Math.max(10, 60 - dist));
    cornerHint.style.cssText = `
      display:block;position:absolute;opacity:0.9;pointer-events:none;z-index:200;
      right:0;bottom:0;width:${sz}px;height:${sz}px;
      background:linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.12) 50%);
      transition:opacity 0.2s;
    `;
  } else if (nearLeft) {
    const dist = Math.max(4, Math.sqrt(Math.pow(bookX, 2) + Math.pow(H - bookY, 2)));
    const sz   = Math.min(42, Math.max(10, 60 - dist));
    cornerHint.style.cssText = `
      display:block;position:absolute;opacity:0.9;pointer-events:none;z-index:200;
      left:0;bottom:0;width:${sz}px;height:${sz}px;
      background:linear-gradient(225deg, transparent 50%, rgba(0,0,0,0.12) 50%);
      transition:opacity 0.2s;
    `;
  } else {
    cornerHint.style.opacity = '0';
  }
}

/* =====================================================
   EVENT BINDING  — mirrors UI.ts mouse/touch handlers
===================================================== */

/* Helper: get book-relative X,Y from a pointer event */
function getBookXY(e) {
  const rect   = parent.getBoundingClientRect();
  const bookX  = (e.clientX || e.touches[0].clientX) - rect.left;
  const bookY  = (e.clientY || e.touches[0].clientY) - rect.top;
  return { bookX, bookY };
}

/* Click: left half = flip backward, right half = flip forward */
parent.addEventListener('click', (e) => {
  if (animating) return;
  const { bookX } = getBookXY(e);
  if (bookX > W) startFlip('fwd');
  else if (bookX < W && bookX > 0) startFlip('bwd');
});

/* Mouse move: corner hint (showPageCorners) */
parent.addEventListener('mousemove', (e) => {
  const { bookX, bookY } = getBookXY(e);
  updateCornerHint(bookX, bookY);
});
parent.addEventListener('mouseleave', () => {
  cornerHint.style.opacity = '0';
});

/* Touch swipe — equivalent to UI.ts swipeDistance logic */
let touchStartX = 0;
parent.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });

parent.addEventListener('touchend', (e) => {
  const deltaX = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(deltaX) < Settings.swipeDistance) return;
  if (deltaX < 0) startFlip('fwd');   // swipe left = next page
  else            startFlip('bwd');   // swipe right = prev page
}, { passive: true });

/* Keyboard: arrow keys for accessibility */
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') startFlip('fwd');
  if (e.key === 'ArrowLeft')  startFlip('bwd');
});

/* Navigation buttons */
prevBtn.addEventListener('click', () => startFlip('bwd'));
nextBtn.addEventListener('click', () => startFlip('fwd'));

/* Window resize — equivalent to UI.ts onResize handler */
window.addEventListener('resize', () => {
  /* Center book on screen (already handled by flexbox body) */
});

/* =====================================================
   BOOT — equivalent to PageFlip.loadFromHTML()
===================================================== */
renderSpread();

</script>
</body>
</html>
